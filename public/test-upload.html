<!DOCTYPE html>
<html>
<head>
    <title>Test Upload</title>
</head>
<body>
    <h1>Test Image Upload</h1>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="uploadFile()">Upload</button>
    <div id="result"></div>
    <img id="preview" style="max-width: 300px; margin-top: 20px; display: none;">

    <script>
    async function uploadFile() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) {
            alert('Please select a file');
            return;
        }

        const formData = new FormData();
        formData.append('file', file);

        document.getElementById('result').innerHTML = 'Uploading...';

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            console.log('Response:', data);
            
            if (data.success) {
                document.getElementById('result').innerHTML = '✅ Upload successful! URL: ' + data.url;
                document.getElementById('preview').src = data.url;
                document.getElementById('preview').style.display = 'block';
            } else {
                document.getElementById('result').innerHTML = '❌ Upload failed: ' + data.error;
            }
        } catch (error) {
            document.getElementById('result').innerHTML = '❌ Error: ' + error.message;
        }
    }
    </script>
</body>
</html>
